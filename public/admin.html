<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin — Booking Management</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Inter:wght@300..700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <style>
    .admin-layout{display:grid;grid-template-columns:220px 1fr;min-height:100dvh}
    .admin-sidebar{background:var(--color-surface);border-right:1px solid var(--color-divider);padding:var(--space-6);display:flex;flex-direction:column;gap:var(--space-4);position:sticky;top:0;height:100dvh}
    .admin-logo{display:flex;align-items:center;gap:var(--space-3);padding-bottom:var(--space-4);border-bottom:1px solid var(--color-divider)}
    .admin-logo-text{font-family:var(--font-display);font-size:1rem;letter-spacing:0.1em;text-transform:uppercase}
    .admin-logo-text em{color:var(--color-primary);font-style:normal}
    .admin-nav-item{display:flex;align-items:center;gap:var(--space-3);padding:var(--space-2) var(--space-3);border-radius:var(--radius-md);font-size:var(--text-sm);color:var(--color-text-muted);text-decoration:none;transition:all var(--transition-fast)}
    .admin-nav-item:hover,.admin-nav-item.active{background:var(--color-surface-2);color:var(--color-text)}
    .admin-nav-item.active{color:var(--color-primary)}
    .admin-main{padding:var(--space-8);overflow:auto}
    .admin-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:var(--space-6)}
    .admin-title{font-family:var(--font-display);font-size:var(--text-xl);font-weight:500}
    .kpi-row{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:var(--space-4);margin-bottom:var(--space-6)}
    .kpi-card{background:var(--color-surface);border:1px solid var(--color-border);border-radius:var(--radius-lg);padding:var(--space-5)}
    .kpi-label{font-size:var(--text-xs);color:var(--color-text-faint);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:var(--space-2)}
    .kpi-value{font-family:var(--font-display);font-size:var(--text-xl);font-weight:600;color:var(--color-primary)}
    .bookings-table-wrap{background:var(--color-surface);border:1px solid var(--color-border);border-radius:var(--radius-xl);overflow:hidden}
    .table-header{padding:var(--space-4) var(--space-6);border-bottom:1px solid var(--color-divider);display:flex;align-items:center;gap:var(--space-4)}
    .table-search{flex:1;padding:var(--space-2) var(--space-4);background:var(--color-surface-2);border:1px solid var(--color-border);border-radius:var(--radius-md);font-size:var(--text-sm);color:var(--color-text)}
    .table-search:focus{outline:none;border-color:var(--color-primary)}
    table{width:100%;border-collapse:collapse;font-size:var(--text-sm)}
    thead th{text-align:left;padding:var(--space-3) var(--space-4);font-size:var(--text-xs);text-transform:uppercase;letter-spacing:0.08em;color:var(--color-text-faint);background:var(--color-surface-2);border-bottom:1px solid var(--color-divider);white-space:nowrap}
    tbody tr{border-bottom:1px solid var(--color-divider);transition:background var(--transition-fast)}
    tbody tr:last-child{border-bottom:none}
    tbody tr:hover{background:var(--color-surface-2)}
    td{padding:var(--space-3) var(--space-4);color:var(--color-text);vertical-align:middle}
    td.muted{color:var(--color-text-muted)}
    .status-badge{display:inline-flex;align-items:center;padding:2px var(--space-3);border-radius:var(--radius-full);font-size:var(--text-xs);font-weight:600}
    .status-pending{background:rgba(204,136,51,0.15);color:var(--color-warning);border:1px solid rgba(204,136,51,0.25)}
    .status-confirmed{background:rgba(61,155,96,0.15);color:var(--color-success);border:1px solid rgba(61,155,96,0.25)}
    .status-rejected{background:rgba(208,79,79,0.15);color:var(--color-error);border:1px solid rgba(208,79,79,0.25)}
    .status-finished{background:rgba(100,100,120,0.15);color:var(--color-text-muted);border:1px solid var(--color-divider)}
    .action-btn{padding:4px var(--space-3);border-radius:var(--radius-sm);font-size:var(--text-xs);font-weight:600;border:1px solid transparent;transition:all var(--transition-fast);cursor:pointer}
    .action-confirm{background:rgba(61,155,96,0.15);color:var(--color-success);border-color:rgba(61,155,96,0.2)}
    .action-confirm:hover{background:rgba(61,155,96,0.3)}
    .action-reject{background:rgba(208,79,79,0.1);color:var(--color-error);border-color:rgba(208,79,79,0.2)}
    .action-reject:hover{background:rgba(208,79,79,0.25)}
    .empty-admin{padding:var(--space-16);text-align:center;color:var(--color-text-muted)}
    .empty-admin svg{margin:0 auto var(--space-4);color:var(--color-text-faint)}
    .refresh-btn{display:flex;align-items:center;gap:var(--space-2);padding:var(--space-2) var(--space-4);border-radius:var(--radius-md);font-size:var(--text-sm);color:var(--color-text-muted);border:1px solid var(--color-border);transition:all var(--transition-fast);cursor:pointer}
    .refresh-btn:hover{border-color:var(--color-primary);color:var(--color-primary)}
    @media(max-width:768px){.admin-layout{grid-template-columns:1fr}.admin-sidebar{position:relative;height:auto;flex-direction:row;flex-wrap:wrap}.admin-main{padding:var(--space-4)}}
  </style>
</head>
<body>
  <div class="admin-layout">
    <aside class="admin-sidebar">
      <div class="admin-logo">
        <svg width="28" height="28" viewBox="0 0 38 38" fill="none"><rect x="1" y="1" width="36" height="36" rx="8" stroke="#c9a84c" stroke-width="1.5"/><path d="M9 26 L14 14 L19 22 L24 16 L29 26" stroke="#c9a84c" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg>
        <span class="admin-logo-text">CHAUFFEUR<em>.APP</em></span>
      </div>
      <nav>
        <a href="admin.html" class="admin-nav-item active">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
          Bookings
        </a>
        <a href="index.html" class="admin-nav-item">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
          Booking Form
        </a>
      </nav>
    </aside>
    <main class="admin-main">
      <div class="admin-header">
        <h1 class="admin-title">Bookings</h1>
        <button class="refresh-btn" onclick="loadBookings()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
          Refresh
        </button>
      </div>
      <div class="kpi-row">
        <div class="kpi-card"><div class="kpi-label">Total</div><div class="kpi-value" id="kpi-total">0</div></div>
        <div class="kpi-card"><div class="kpi-label">Pending</div><div class="kpi-value" id="kpi-pending" style="color:var(--color-warning)">0</div></div>
        <div class="kpi-card"><div class="kpi-label">Confirmed</div><div class="kpi-value" id="kpi-confirmed" style="color:var(--color-success)">0</div></div>
        <div class="kpi-card"><div class="kpi-label">Today</div><div class="kpi-value" id="kpi-today">0</div></div>
      </div>
      <div class="bookings-table-wrap">
        <div class="table-header">
          <input type="search" class="table-search" id="search-input" placeholder="Search by name, email or ID…" oninput="filterTable()" />
        </div>
        <div id="table-container">
          <div class="empty-admin">
            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
            <p>No bookings yet. They will appear here when submitted.</p>
          </div>
        </div>
      </div>
    </main>
  </div>
  <script>
    let allBookings = [];
    async function loadBookings() {
      try {
        const res = await fetch('/api/bookings');
        const data = await res.json();
        allBookings = data.bookings || [];
        renderTable(allBookings);
        updateKPIs(allBookings);
      } catch(e) {
        document.getElementById('table-container').innerHTML = '<div class="empty-admin"><p style="color:var(--color-error)">Failed to load bookings. Make sure the server is running.</p></div>';
      }
    }
    function updateKPIs(b) {
      const today = new Date().toISOString().split('T')[0];
      document.getElementById('kpi-total').textContent = b.length;
      document.getElementById('kpi-pending').textContent = b.filter(x=>x.status==='pending').length;
      document.getElementById('kpi-confirmed').textContent = b.filter(x=>x.status==='confirmed').length;
      document.getElementById('kpi-today').textContent = b.filter(x=>x.createdAt?.startsWith(today)).length;
    }
    function cap(s){return s?s.charAt(0).toUpperCase()+s.slice(1):''}
    function renderTable(bookings) {
      if (!bookings.length) { document.getElementById('table-container').innerHTML = '<div class="empty-admin"><svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/></svg><p>No bookings found.</p></div>'; return; }
      const rows = bookings.map(b => `<tr id="row-${b.id}"><td class="muted" style="font-family:monospace;font-size:var(--text-xs)">${b.id.slice(0,8).toUpperCase()}</td><td>${b.firstName||''} ${b.lastName||''}</td><td class="muted">${b.email||'\u2014'}</td><td>${b.countryCode||''} ${b.phone||'\u2014'}</td><td>${b.serviceType==='hourly'?'\u23f1 Hourly':'\ud83d\ude97 Transfer'}</td><td>${b.pickupLocation||b.hourlyPickup||'\u2014'}</td><td>${b.vehicleName||'\u2014'}</td><td class="muted" style="font-size:var(--text-xs)">${new Date(b.createdAt).toLocaleString('en-BH')}</td><td><span class="status-badge status-${b.status}">${cap(b.status)}</span></td><td><div style="display:flex;gap:4px">${b.status==='pending'?`<button class="action-btn action-confirm" onclick="updateStatus('${b.id}','confirmed')">\u2713 Confirm</button><button class="action-btn action-reject" onclick="updateStatus('${b.id}','rejected')">\u2717 Reject</button>`:`<button class="action-btn" style="border-color:var(--color-border);color:var(--color-text-muted)" onclick="updateStatus('${b.id}','finished')">Finish</button>`}</div></td></tr>`).join('');
      document.getElementById('table-container').innerHTML = `<div style="overflow-x:auto"><table><thead><tr><th>ID</th><th>Name</th><th>Email</th><th>Phone</th><th>Type</th><th>Pick Up</th><th>Vehicle</th><th>Booked</th><th>Status</th><th>Actions</th></tr></thead><tbody>${rows}</tbody></table></div>`;
    }
    function filterTable() {
      const q = document.getElementById('search-input').value.toLowerCase();
      renderTable(allBookings.filter(b => (b.firstName+' '+b.lastName).toLowerCase().includes(q)||(b.email||'').toLowerCase().includes(q)||b.id.toLowerCase().includes(q)));
    }
    async function updateStatus(id, status) {
      try { await fetch(`/api/bookings/${id}/status`,{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({status})}); loadBookings(); }
      catch(e){alert('Update failed');}
    }
    loadBookings();
    setInterval(loadBookings, 30000);
  </script>
</body>
</html>
